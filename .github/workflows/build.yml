name: Build Any Mapper

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew || true

      - name: Get version
        id: version
        run: echo "name=${GITHUB_REF_NAME:-dev}" >> $GITHUB_OUTPUT

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Build release APK
        run: gradle :app:assembleRelease

      - name: Rename APKs
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/any-mapper-${VERSION}-debug.apk || true
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/any-mapper-${VERSION}.apk || true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AnyMapper-debug
          path: app/build/outputs/apk/debug/any-mapper-*.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: AnyMapper-release
          path: app/build/outputs/apk/release/any-mapper-*.apk

      - name: Create Pre-Release
        if: startsWith(github.ref, 'refs/tags/') && contains(github.ref, '-pre')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            app/build/outputs/apk/release/any-mapper-*.apk
            app/build/outputs/apk/debug/any-mapper-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Stable Release
        if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-pre')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          files: |
            app/build/outputs/apk/release/any-mapper-*.apk
            app/build/outputs/apk/debug/any-mapper-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
